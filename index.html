<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f2f7;
      --sidebar-bg: #ffffff;
      --chat-bg: #ffffff;
      --bubble-sent: #007aff;
      --bubble-received: #e9e9eb;
      --text-sent: #ffffff;
      --text-received: #000000;
      --text-muted: #8e8e93;
      --text-primary: #000000;
      --border: rgba(0,0,0,0.1);
      --input-bg: #f2f2f7;
      --search-bg: rgba(0,0,0,0.06);
      --active-row: rgba(0,122,255,0.12);
      --hover-row: rgba(0,0,0,0.04);
      --shadow: 0 1px 0 var(--border);
      --topbar: rgba(255,255,255,0.88);
      --radius: 18px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --sidebar-bg: #2c2c2e;
        --chat-bg: #1c1c1e;
        --bubble-received: #3a3a3c;
        --text-received: #ffffff;
        --text-muted: #636366;
        --text-primary: #ffffff;
        --border: rgba(255,255,255,0.08);
        --input-bg: #2c2c2e;
        --search-bg: rgba(255,255,255,0.07);
        --active-row: rgba(0,122,255,0.22);
        --hover-row: rgba(255,255,255,0.05);
        --topbar: rgba(28,28,30,0.88);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ AUTH ══ */
    #auth-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .auth-card {
      background: var(--sidebar-bg);
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%; max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.13);
      border: 1px solid var(--border);
    }
    .auth-logo {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .auth-logo-icon {
      width: 66px; height: 66px;
      background: var(--bubble-sent);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      box-shadow: 0 10px 28px rgba(0,122,255,0.38);
    }
    .auth-logo h1 {
      font-size: 24px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.4px;
    }
    .auth-logo p { font-size: 14px; color: var(--text-muted); margin-top: -4px; }

    .auth-tabs {
      display: flex; background: var(--search-bg);
      border-radius: 10px; padding: 3px; margin-bottom: 22px;
    }
    .auth-tab {
      flex: 1; padding: 7px; border: none; background: none;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .auth-tab.active {
      background: var(--sidebar-bg); color: var(--text-primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .auth-form { display: flex; flex-direction: column; gap: 12px; }
    .auth-field { display: flex; flex-direction: column; gap: 5px; }
    .auth-field label {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .auth-field input {
      background: var(--input-bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
      font-size: 15px; color: var(--text-primary);
      outline: none; font-family: inherit; transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .auth-field input:focus {
      border-color: var(--bubble-sent);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.14);
    }

    #auth-error {
      background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.28);
      color: #ff3b30; border-radius: 10px; padding: 10px 14px;
      font-size: 13px; font-weight: 500; display: none;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
    }

    .auth-submit {
      width: 100%; padding: 13px;
      background: var(--bubble-sent); color: #fff;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .auth-submit:hover { opacity: 0.9; }
    .auth-submit:active { transform: scale(0.98); }
    .auth-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ══ APP ══ */
    #app-screen { display: none; width: 100%; height: 100%; }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px; min-width: 280px;
      background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 50px 14px 12px;
      background: var(--topbar);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: var(--shadow); flex-shrink: 0;
    }
    .sidebar-title-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .sidebar-title {
      font-size: 26px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.4px;
    }
    .sidebar-actions { display: flex; gap: 6px; align-items: center; }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--search-bg); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--bubble-sent); transition: background 0.15s; flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--active-row); }

    .user-pill {
      display: flex; align-items: center; gap: 7px; margin-bottom: 10px;
    }
    #user-display-name {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .search-wrap {
      display: flex; align-items: center; gap: 8px;
      background: var(--search-bg); border-radius: 10px; padding: 7px 12px;
    }
    .search-wrap svg { color: var(--text-muted); flex-shrink: 0; }
    #sidebar-search {
      background: none; border: none; outline: none;
      font-size: 15px; color: var(--text-primary);
      width: 100%; font-family: inherit;
    }
    #sidebar-search::placeholder { color: var(--text-muted); }

    #conv-list { flex: 1; overflow-y: auto; scrollbar-width: none; }
    #conv-list::-webkit-scrollbar { display: none; }

    .conv-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; cursor: pointer; transition: background 0.1s;
      border-bottom: 1px solid var(--border);
    }
    .conv-row:hover { background: var(--hover-row); }
    .conv-row.active { background: var(--active-row); }

    .avatar {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; user-select: none; flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name {
      font-size: 15px; font-weight: 600; color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .conv-preview {
      font-size: 13px; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px;
    }
    .conv-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
    .empty-list {
      text-align: center; color: var(--text-muted);
      font-size: 14px; padding: 40px 20px; line-height: 1.7;
    }

    /* ── Chat ── */
    #chat-area {
      flex: 1; display: flex; flex-direction: column;
      background: var(--chat-bg); overflow: hidden;
    }
    #empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text-muted);
    }
    .empty-icon { font-size: 64px; opacity: 0.22; }
    #empty-state p { font-size: 17px; font-weight: 600; }
    #empty-state span { font-size: 14px; }

    #chat-main { flex-direction: column; height: 100%; overflow: hidden; }

    #chat-topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px 10px; padding-top: 50px;
      background: var(--topbar);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: var(--shadow); flex-shrink: 0;
    }
    #chat-avatar { width: 34px; height: 34px; font-size: 13px; }
    .chat-title-wrap { flex: 1; text-align: center; }
    #chat-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }

    #messages {
      flex: 1; overflow-y: auto; padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 3px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .date-divider {
      text-align: center; font-size: 11px; font-weight: 500;
      color: var(--text-muted); margin: 10px 0 6px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }

    .msg-row {
      display: flex; max-width: 72%;
      animation: msgIn 0.24s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes msgIn {
      from { opacity:0; transform:scale(0.84) translateY(6px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .msg-row.sent     { align-self: flex-end; justify-content: flex-end; }
    .msg-row.received { align-self: flex-start; }

    .bubble-wrap { display: flex; flex-direction: column; }
    .msg-row.sent .bubble-wrap     { align-items: flex-end; }
    .msg-row.received .bubble-wrap { align-items: flex-start; }

    .bubble {
      padding: 9px 14px; border-radius: var(--radius);
      font-size: 15px; line-height: 1.45;
      word-break: break-word; max-width: 100%; white-space: pre-wrap;
    }
    .bubble.sent {
      background: var(--bubble-sent); color: var(--text-sent);
      border-bottom-right-radius: 5px;
    }
    .bubble.received {
      background: var(--bubble-received); color: var(--text-received);
      border-bottom-left-radius: 5px;
    }
    .msg-meta {
      font-size: 10px; color: var(--text-muted);
      padding: 2px 4px 0;
    }

    /* Input */
    #input-bar {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 8px 12px 16px;
      background: var(--topbar);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: var(--shadow); flex-shrink: 0;
    }
    #input-wrap {
      flex: 1; display: flex; align-items: flex-end;
      background: var(--input-bg); border-radius: 20px;
      border: 1.5px solid var(--border); padding: 7px 12px; gap: 8px;
      transition: border-color 0.2s;
    }
    #input-wrap:focus-within { border-color: rgba(0,122,255,0.38); }
    #msg-input {
      flex: 1; background: none; border: none; outline: none;
      resize: none; font-size: 15px; color: var(--text-primary);
      font-family: inherit; line-height: 1.4; max-height: 120px;
      overflow-y: auto; scrollbar-width: none;
    }
    #msg-input::placeholder { color: var(--text-muted); }
    #msg-input::-webkit-scrollbar { display: none; }

    #send-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bubble-sent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; opacity: 0.32;
      transition: opacity 0.2s, transform 0.14s;
      pointer-events: none;
    }
    #send-btn.active { opacity: 1; pointer-events: all; }
    #send-btn:active { transform: scale(0.85); }

    /* Modal */
    #new-chat-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.44);
      z-index: 500; align-items: center; justify-content: center; padding: 20px;
    }
    #new-chat-modal.show { display: flex; }
    .modal-card {
      background: var(--sidebar-bg); border-radius: 20px;
      padding: 24px; width: 100%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
      animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(0.88); }
      to   { opacity:1; transform:scale(1); }
    }
    .modal-card h2 {
      font-size: 18px; font-weight: 700;
      color: var(--text-primary); margin-bottom: 14px;
    }
    .modal-search {
      display: flex; align-items: center; gap: 8px;
      background: var(--search-bg); border-radius: 12px;
      padding: 9px 14px; margin-bottom: 10px;
    }
    #search-user-input {
      background: none; border: none; outline: none;
      font-size: 15px; color: var(--text-primary);
      width: 100%; font-family: inherit;
    }
    #search-user-input::placeholder { color: var(--text-muted); }
    #user-search-results { max-height: 240px; overflow-y: auto; }
    .result-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-radius: 12px; cursor: pointer; transition: background 0.1s;
    }
    .result-item:hover { background: var(--hover-row); }
    .result-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .result-email { font-size: 12px; color: var(--text-muted); }
    .no-results { text-align:center; color:var(--text-muted); font-size:14px; padding:20px; }

    #modal-cancel {
      width: 100%; margin-top: 10px; padding: 10px; border: none;
      background: var(--search-bg); border-radius: 12px;
      font-size: 15px; font-weight: 600; color: var(--text-muted);
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    #modal-cancel:hover { background: var(--hover-row); }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(18px);
      background: rgba(0,0,0,0.76); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 14px; font-weight: 500;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      z-index: 9999; white-space: nowrap; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Mobile */
    @media (max-width: 640px) {
      #sidebar { width: 100%; }
      #chat-area { display: none; position: fixed; inset: 0; z-index: 50; }
      #chat-area.mobile-open { display: flex; }
      #back-btn { display: flex !important; }
    }
    #back-btn { display: none; }
  </style>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <h1>Messages</h1>
      <p>Chat with anyone, instantly</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-signin" onclick="showTab('signin')">Sign In</button>
      <button class="auth-tab"        id="tab-signup" onclick="showTab('signup')">Sign Up</button>
    </div>

    <div id="auth-error"></div>

    <!-- Sign In -->
    <form id="signin-form" class="auth-form" onsubmit="handleSignIn(event)">
      <div class="auth-field">
        <label>Email</label>
        <input id="signin-email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input id="signin-pass" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="auth-submit" type="submit">Sign In</button>
    </form>

    <!-- Sign Up -->
    <form id="signup-form" class="auth-form" style="display:none" onsubmit="handleSignUp(event)">
      <div class="auth-field">
        <label>Your Name</label>
        <input id="signup-name" type="text" placeholder="Alex Johnson" autocomplete="name" required />
      </div>
      <div class="auth-field">
        <label>Email</label>
        <input id="signup-email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input id="signup-pass" type="password" placeholder="Min. 6 characters" autocomplete="new-password" minlength="6" required />
      </div>
      <button class="auth-submit" type="submit">Create Account</button>
    </form>
  </div>
</div>

<!-- ══════════════ APP SCREEN ══════════════ -->
<div id="app-screen">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="sidebar-title-row">
        <span class="sidebar-title">Messages</span>
        <div class="sidebar-actions">
          <div class="user-pill">
            <div class="avatar" id="user-avatar-sidebar" style="width:24px;height:24px;font-size:10px"></div>
            <span id="user-display-name"></span>
          </div>
          <button class="icon-btn" id="new-chat-btn" title="New conversation">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l-4 1 1-4L17.5 2.5a2.121 2.121 0 013 3L9 13z"/>
            </svg>
          </button>
          <button class="icon-btn" id="signout-btn" title="Sign out">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="search-wrap">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
        </svg>
        <input id="sidebar-search" type="text" placeholder="Search" />
      </div>
    </div>
    <div id="conv-list">
      <div class="empty-list">No conversations yet.<br>Tap ✏️ to start one!</div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-area">
    <div id="empty-state">
      <div class="empty-icon">💬</div>
      <p>No conversation open</p>
      <span>Select one or start a new message</span>
    </div>

    <div id="chat-main" style="display:none">
      <div id="chat-topbar">
        <button class="icon-btn" id="back-btn">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <div class="avatar" id="chat-avatar"></div>
        <div class="chat-title-wrap">
          <div id="chat-name"></div>
        </div>
      </div>

      <div id="messages"></div>

      <div id="input-bar">
        <div id="input-wrap">
          <textarea id="msg-input" rows="1" placeholder="iMessage"></textarea>
        </div>
        <button id="send-btn">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- New Chat Modal -->
<div id="new-chat-modal">
  <div class="modal-card">
    <h2>New Message</h2>
    <div class="modal-search">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="color:var(--text-muted);flex-shrink:0">
        <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-user-input" type="text" placeholder="Search by name or email…" autocomplete="off" />
    </div>
    <div id="user-search-results"></div>
    <button id="modal-cancel">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<!-- ══ Firebase + App Logic ══ -->
<script type="module">
  import { initializeApp }                    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
           signOut, onAuthStateChanged, updateProfile }
                                              from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs,
           addDoc, query, where, orderBy, onSnapshot, serverTimestamp }
                                              from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ╔══════════════════════════════════════════╗
  // ║  PASTE YOUR FIREBASE CONFIG HERE         ║
  // ╚══════════════════════════════════════════╝
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  /* ─── helpers ─── */
  const $   = id => document.getElementById(id);
  const COLORS = ['#007aff','#34c759','#ff9500','#ff3b30','#af52de','#ff2d55','#5ac8fa','#30b0c7'];
  const avatarColor = s => { let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; };
  const initials    = n => n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const escHtml     = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  const convId      = (a,b) => [a,b].sort().join('_');
  const fmtTime     = ts => {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts), now = new Date(), diff = now - d;
    if (diff < 86400000)  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if (diff < 604800000) return d.toLocaleDateString([],{weekday:'short'});
    return d.toLocaleDateString([],{month:'short',day:'numeric'});
  };
  const showError = msg => {
    const e = $('auth-error'); e.textContent = msg; e.style.display = 'block';
    setTimeout(()=>{ e.style.display='none'; }, 4200);
  };
  const showToast = msg => {
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2600);
  };
  const friendlyErr = code => ({
    'auth/email-already-in-use': 'That email is already registered.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/user-not-found':       'No account found with that email.',
    'auth/wrong-password':       'Incorrect password — try again.',
    'auth/invalid-credential':   'Invalid email or password.',
    'auth/too-many-requests':    'Too many attempts. Wait a moment.',
  }[code] || 'Something went wrong. Please try again.');

  /* ─── tab toggle ─── */
  window.showTab = tab => {
    $('signin-form').style.display = tab==='signin' ? 'flex' : 'none';
    $('signup-form').style.display = tab==='signup' ? 'flex' : 'none';
    $('tab-signin').classList.toggle('active', tab==='signin');
    $('tab-signup').classList.toggle('active', tab==='signup');
    $('auth-error').style.display = 'none';
  };

  /* ─── auth handlers (exposed globally for inline onsubmit) ─── */
  window.handleSignUp = async e => {
    e.preventDefault();
    const btn   = e.target.querySelector('.auth-submit');
    const name  = $('signup-name').value.trim();
    const email = $('signup-email').value.trim();
    const pass  = $('signup-pass').value;
    if (!name) return showError('Please enter your name.');
    try {
      btn.disabled = true;
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db,'users',cred.user.uid), {
        uid: cred.user.uid, displayName: name, email, createdAt: serverTimestamp()
      });
    } catch(err) { showError(friendlyErr(err.code)); }
    finally { btn.disabled = false; }
  };

  window.handleSignIn = async e => {
    e.preventDefault();
    const btn = e.target.querySelector('.auth-submit');
    try {
      btn.disabled = true;
      await signInWithEmailAndPassword(auth, $('signin-email').value, $('signin-pass').value);
    } catch(err) { showError(friendlyErr(err.code)); }
    finally { btn.disabled = false; }
  };

  /* ─── state ─── */
  let currentUser    = null;
  let activeConvId   = null;
  let msgUnsub       = null;
  let convUnsub      = null;

  /* ─── auth state ─── */
  onAuthStateChanged(auth, async user => {
    if (user) {
      currentUser = user;
      $('auth-screen').style.display = 'none';
      $('app-screen').style.display  = 'flex';
      $('user-display-name').textContent     = user.displayName || user.email;
      $('user-avatar-sidebar').textContent   = initials(user.displayName || user.email);
      $('user-avatar-sidebar').style.background = avatarColor(user.uid);

      // ensure user doc exists (e.g. after oauth or first login)
      const uRef = doc(db,'users',user.uid);
      const snap = await getDoc(uRef);
      if (!snap.exists()) {
        await setDoc(uRef, { uid:user.uid, displayName:user.displayName||user.email, email:user.email, createdAt:serverTimestamp() });
      }

      listenConversations();
    } else {
      currentUser = null;
      $('auth-screen').style.display = 'flex';
      $('app-screen').style.display  = 'none';
      if (convUnsub) convUnsub();
      if (msgUnsub)  msgUnsub();
    }
  });

  $('signout-btn').addEventListener('click', () => signOut(auth));

  /* ─── conversations ─── */
  function listenConversations() {
    const q = query(collection(db,'conversations'), where('participants','array-contains',currentUser.uid));
    convUnsub = onSnapshot(q, snap => {
      const convs = snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.lastAt?.seconds||0)-(a.lastAt?.seconds||0));
      renderConvList(convs);
    });
  }

  async function renderConvList(convs) {
    const list = $('conv-list');
    list.innerHTML = '';
    if (!convs.length) {
      list.innerHTML = '<div class="empty-list">No conversations yet.<br>Tap ✏️ to start one!</div>';
      return;
    }
    for (const conv of convs) {
      const otherId   = conv.participants.find(p => p !== currentUser.uid);
      const otherSnap = await getDoc(doc(db,'users',otherId));
      const other     = otherSnap.exists() ? otherSnap.data() : { displayName:'Unknown', uid:otherId };
      const row = document.createElement('div');
      row.className        = 'conv-row' + (conv.id===activeConvId?' active':'');
      row.dataset.convId   = conv.id;
      row.dataset.otherName= other.displayName;
      row.innerHTML = `
        <div class="avatar" style="background:${avatarColor(otherId)};width:46px;height:46px;font-size:17px">${initials(other.displayName)}</div>
        <div class="conv-info">
          <div class="conv-name">${escHtml(other.displayName)}</div>
          <div class="conv-preview">${escHtml(conv.lastMsg||'')}</div>
        </div>
        <div class="conv-time">${fmtTime(conv.lastAt)}</div>
      `;
      row.addEventListener('click', () => openConv(conv.id, otherId, other.displayName));
      list.appendChild(row);
    }
  }

  /* ─── open conversation ─── */
  function openConv(cid, otherId, otherName) {
    activeConvId = cid;
    if (msgUnsub) msgUnsub();

    $('empty-state').style.display  = 'none';
    $('chat-main').style.display    = 'flex';
    $('chat-name').textContent       = otherName;
    $('chat-avatar').textContent     = initials(otherName);
    $('chat-avatar').style.background= avatarColor(otherId);
    $('chat-avatar').style.width     = '34px';
    $('chat-avatar').style.height    = '34px';
    $('chat-avatar').style.fontSize  = '13px';
    $('chat-area').classList.add('mobile-open');

    document.querySelectorAll('.conv-row').forEach(r =>
      r.classList.toggle('active', r.dataset.convId===cid));

    const q = query(collection(db,'conversations',cid,'messages'), orderBy('createdAt','asc'));
    msgUnsub = onSnapshot(q, snap => {
      renderMessages(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
  }

  function renderMessages(msgs) {
    const container = $('messages');
    container.innerHTML = '';
    let lastDate = '';

    msgs.forEach(msg => {
      const isSent = msg.senderId === currentUser.uid;
      const d      = msg.createdAt?.toDate ? msg.createdAt.toDate() : new Date();
      const dateLabel = d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});

      if (dateLabel !== lastDate) {
        lastDate = dateLabel;
        const dv = document.createElement('div');
        dv.className = 'date-divider'; dv.textContent = dateLabel;
        container.appendChild(dv);
      }

      const timeStr = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      const row = document.createElement('div');
      row.className = `msg-row ${isSent?'sent':'received'}`;
      row.innerHTML = `
        <div class="bubble-wrap">
          <div class="bubble ${isSent?'sent':'received'}">${escHtml(msg.text)}</div>
          <div class="msg-meta">${timeStr}${isSent?' · Delivered':''}</div>
        </div>
      `;
      container.appendChild(row);
    });

    container.scrollTop = container.scrollHeight;
  }

  /* ─── send ─── */
  async function sendMessage() {
    const text = $('msg-input').value.trim();
    if (!text || !activeConvId) return;
    $('msg-input').value = '';
    $('send-btn').classList.remove('active');
    autoResize($('msg-input'));
    try {
      await addDoc(collection(db,'conversations',activeConvId,'messages'), {
        text, senderId: currentUser.uid, createdAt: serverTimestamp()
      });
      await setDoc(doc(db,'conversations',activeConvId), {
        lastMsg: text, lastAt: serverTimestamp()
      }, { merge:true });
    } catch(err) {
      showToast('Failed to send. Check your connection.');
    }
  }

  $('send-btn').addEventListener('click', sendMessage);
  $('msg-input').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  $('msg-input').addEventListener('input', () => {
    $('send-btn').classList.toggle('active', $('msg-input').value.trim().length > 0);
    autoResize($('msg-input'));
  });

  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  }

  /* ─── new conversation modal ─── */
  $('new-chat-btn').addEventListener('click', () => {
    $('new-chat-modal').classList.add('show');
    $('search-user-input').value = '';
    $('user-search-results').innerHTML = '';
    setTimeout(()=>$('search-user-input').focus(), 120);
  });
  $('modal-cancel').addEventListener('click', () => $('new-chat-modal').classList.remove('show'));
  $('new-chat-modal').addEventListener('click', e => {
    if (e.target===$('new-chat-modal')) $('new-chat-modal').classList.remove('show');
  });

  $('search-user-input').addEventListener('input', async e => {
    const val = e.target.value.trim().toLowerCase();
    const res = $('user-search-results');
    if (!val) { res.innerHTML=''; return; }

    const snap = await getDocs(collection(db,'users'));
    const found = [];
    snap.forEach(d => {
      const u = d.data();
      if (u.uid!==currentUser.uid &&
         (u.displayName.toLowerCase().includes(val) || u.email.toLowerCase().includes(val)))
        found.push(u);
    });

    res.innerHTML = '';
    if (!found.length) { res.innerHTML='<div class="no-results">No users found</div>'; return; }
    found.forEach(u => {
      const item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML = `
        <div class="avatar" style="background:${avatarColor(u.uid)};width:38px;height:38px;font-size:14px">${initials(u.displayName)}</div>
        <div>
          <div class="result-name">${escHtml(u.displayName)}</div>
          <div class="result-email">${escHtml(u.email)}</div>
        </div>
      `;
      item.addEventListener('click', () => startConv(u));
      res.appendChild(item);
    });
  });

  async function startConv(other) {
    $('new-chat-modal').classList.remove('show');
    const cid = convId(currentUser.uid, other.uid);
    const ref  = doc(db,'conversations',cid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, { participants:[currentUser.uid,other.uid], lastMsg:'', lastAt:serverTimestamp() });
    }
    openConv(cid, other.uid, other.displayName);
  }

  /* ─── sidebar search ─── */
  $('sidebar-search').addEventListener('input', e => {
    const val = e.target.value.toLowerCase();
    document.querySelectorAll('.conv-row').forEach(r => {
      r.style.display = r.dataset.otherName?.toLowerCase().includes(val) ? '' : 'none';
    });
  });

  /* ─── mobile back ─── */
  $('back-btn').addEventListener('click', () => $('chat-area').classList.remove('mobile-open'));
</script>
</body>
</html>
